<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSU Helpdesk Ticketing System</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="dashboard.html">NSU Helpdesk Ticketing System</a>
        </div>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="create_ticket.html" class="active">New Ticket</a>
            <a href="manage_tickets.html">Manage</a>
            <a href="categories.html">Categories</a>
            <a href="manage_users.html">Users</a>
            <a href="profile.html">Profile</a>
            <a href="login.html" class="nav-logout">Logout</a>
        </div>
        <div class="nav-user">
            <span>Admin User</span>
            <span class="badge role-badge">Staff</span>
        </div>
    </nav>

    <main class="container">

        <div class="card">
            <div class="card-header">
                <h2>Create New Ticket</h2>
                <a href="dashboard.html" class="btn btn-secondary btn-sm">Back</a>
            </div>

            <!-- <div class="alert alert-danger">Subject and description are required.</div> -->

            <form method="POST" action="#" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" class="form-control"
                           value="" required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" class="form-control" rows="5" required></textarea>
                </div>

                <div style="display:flex; gap:1rem; flex-wrap:wrap;">
                    <div class="form-group" style="flex:1; min-width:200px;">
                        <label for="category_id">Category</label>
                        <select id="category_id" name="category_id" class="form-control">
                            <option value="0">-- Select --</option>
                            <option value="1">IT Support</option>
                            <option value="2">Network Issues</option>
                            <option value="3">Library Services</option>
                            <option value="4">Admission</option>
                            <option value="5">Financial Aid</option>
                        </select>
                    </div>

                    <div class="form-group" style="flex:1; min-width:200px;">
                        <label for="priority">Priority</label>
                        <select id="priority" name="priority" class="form-control">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                            <option value="critical">Critical</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="attachment">Attachment (optional)</label>
                    <input type="file" id="attachment" name="attachment" class="form-control">
                </div>

                <button type="submit" class="btn btn-primary">Submit Ticket</button>
            </form>
        </div>

    </main>
    <footer class="footer">
        <p>NSU Helpdesk Ticketing System v1.0.0</p>
    </footer>
    <script src="assets/js/app.js"></script>
</body>
</html>
