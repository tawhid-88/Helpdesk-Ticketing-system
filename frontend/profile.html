<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSU Helpdesk Ticketing System</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="dashboard.html">NSU Helpdesk Ticketing System</a>
        </div>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="create_ticket.html">New Ticket</a>
            <a href="manage_tickets.html">Manage</a>
            <a href="categories.html">Categories</a>
            <a href="manage_users.html">Users</a>
            <a href="profile.html" class="active">Profile</a>
            <a href="login.html" class="nav-logout">Logout</a>
        </div>
        <div class="nav-user">
            <span>Admin User</span>
            <span class="badge role-badge">Staff</span>
        </div>
    </nav>

    <main class="container">

        <div class="card">
            <div class="card-header"><h2>My Profile</h2></div>

            <!-- <div class="alert alert-danger">Name and email are required.</div> -->

            <form method="POST" action="#">
                <input type="hidden" name="action" value="update_profile">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" class="form-control"
                           value="Admin User" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control"
                           value="admin@northsouth.edu" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <input type="text" class="form-control" value="Staff" disabled>
                </div>
                <div class="form-group">
                    <label>Member Since</label>
                    <input type="text" class="form-control" value="2026-01-15 09:00:00" disabled>
                </div>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
        </div>

        <div class="card">
            <div class="card-header"><h2>Change Password</h2></div>

            <!-- <div class="alert alert-danger">Current password is incorrect.</div> -->

            <form method="POST" action="#">
                <input type="hidden" name="action" value="change_password">
                <div class="form-group">
                    <label for="current_password">Current Password</label>
                    <input type="password" id="current_password" name="current_password" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <input type="password" id="new_password" name="new_password" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm New Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary">Change Password</button>
            </form>
        </div>

    </main>
    <footer class="footer">
        <p>NSU Helpdesk Ticketing System v1.0.0</p>
    </footer>
    <script src="assets/js/app.js"></script>
</body>
</html>
