<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - NSU Helpdesk Ticketing System</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <h1>NSU Helpdesk Ticketing System</h1>
        <p class="subtitle">Create your NSU account</p>

        <!-- <div class="alert alert-danger">Passwords do not match.</div> -->

        <form method="POST" action="#">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-control"
                       value="" required>
            </div>
            <div class="form-group">
                <label for="email">NSU Email</label>
                <input type="email" id="email" name="email" class="form-control"
                       value="" required>
            </div>
            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" name="role" class="form-control">
                    <option value="student" selected>Student</option>
                    <option value="faculty">Faculty</option>
                    <option value="staff">Staff</option>
                </select>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Register</button>
        </form>
        <p style="text-align:center; margin-top:1rem; font-size:0.85rem; color:#888;">
            Already have an account? <a href="login.html">Login here</a>
        </p>
    </div>
</div>
<script src="assets/js/app.js"></script>
</body>
</html>
